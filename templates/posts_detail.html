<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ post['title'] }}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { background: radial-gradient(circle at top left, #fdf4ff 0%, #f7f9fb 40%, #eef2ff 100%); }
    .liquid-blob { filter: blur(80px); z-index: -1; }
  </style>
</head>
<body class="font-['Be_Vietnam_Pro'] text-[#191c1e] min-h-screen">
  <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-violet-200/40 liquid-blob"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-fuchsia-200/30 liquid-blob"></div>

  <header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-6 py-3 max-w-5xl mx-auto rounded-full mx-4 mt-4 bg-white/40 backdrop-blur-3xl border border-white/20">
    <a href="/posts" class="text-violet-700 font-semibold">← 목록</a>
    <a href="/posts/new" class="text-violet-700 font-semibold">글쓰기</a>
  </header>

  <main class="pt-32 pb-24 px-6 max-w-4xl mx-auto">
    <article class="bg-white/30 backdrop-blur-3xl rounded-3xl p-10 border border-white/40 shadow-[0_30px_80px_-20px_rgba(103,75,181,0.25)]">
      <p class="text-sm text-slate-600">{{ post['created_at'] }}</p>
      <h1 class="mt-2 text-5xl leading-tight font-['Plus_Jakarta_Sans'] font-bold text-violet-700 break-words">{{ post['title'] }}</h1>
      <div class="mt-8 text-lg leading-8 whitespace-pre-wrap">{{ post['content'] }}</div>
    </article>
  </main>
</body>
</html>
