<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAW_TYPE | POSTS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#f9f9f9] text-black font-['Work_Sans']">
  <header class="sticky top-0 z-50 bg-white border-b-4 border-black px-8 py-6 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] flex justify-between items-center">
    <h1 class="text-3xl font-black font-['Space_Grotesk'] uppercase tracking-tight bg-[#FFE600] border-4 border-black px-3 py-1">RAW_TYPE BOARD</h1>
    <a href="/posts/new" class="bg-black text-[#FFE600] border-4 border-black px-5 py-2 font-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-y-[-2px] transition">NEW POST</a>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-12">
    <section class="grid gap-6">
      {% if posts %}
        {% for post in posts %}
        <article class="bg-white border-[3px] border-black p-6 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-2xl font-bold font-['Space_Grotesk'] uppercase break-words">{{ post['title'] }}</h2>
              <p class="mt-2 text-sm font-semibold">{{ post['created_at'] }}</p>
            </div>
            <a href="/posts/{{ post['id'] }}" class="shrink-0 bg-[#FFE600] border-2 border-black px-3 py-1 font-bold uppercase">DETAIL</a>
          </div>
          <p class="mt-4 text-base leading-7 line-clamp-3">{{ post['content'] }}</p>
        </article>
        {% endfor %}
      {% else %}
        <article class="bg-white border-[3px] border-black p-10 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] text-center">
          <p class="text-xl font-bold font-['Space_Grotesk'] uppercase">NO POSTS YET</p>
          <p class="mt-2">첫 글을 작성해보세요.</p>
        </article>
      {% endif %}
    </section>
  </main>
</body>
</html>
