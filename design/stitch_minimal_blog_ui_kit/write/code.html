<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Journal - New Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#717878",
                        "surface-container": "#f0eded",
                        "on-secondary-container": "#5f6161",
                        "primary-fixed": "#c6e9e9",
                        "on-primary-fixed": "#002020",
                        "surface-container-high": "#eae7e7",
                        "secondary-container": "#dcdddc",
                        "secondary": "#5d5f5e",
                        "error": "#ba1a1a",
                        "tertiary": "#492c1d",
                        "secondary-fixed-dim": "#c6c7c6",
                        "on-error": "#ffffff",
                        "outline-variant": "#c1c8c7",
                        "tertiary-container": "#634232",
                        "surface-bright": "#fcf9f8",
                        "surface-tint": "#446464",
                        "inverse-primary": "#abcdcd",
                        "on-primary-container": "#9ec0bf",
                        "inverse-surface": "#313030",
                        "tertiary-fixed": "#ffdbcb",
                        "on-surface": "#1c1b1b",
                        "surface-container-low": "#f6f3f2",
                        "background": "#fcf9f8",
                        "primary": "#173838",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#414848",
                        "surface-dim": "#dcd9d9",
                        "secondary-fixed": "#e2e2e2",
                        "on-secondary-fixed-variant": "#454747",
                        "on-primary-fixed-variant": "#2c4c4c",
                        "on-tertiary-container": "#ddb09b",
                        "primary-fixed-dim": "#abcdcd",
                        "tertiary-fixed-dim": "#ebbda7",
                        "surface-variant": "#e5e2e1",
                        "on-background": "#1c1b1b",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-secondary": "#ffffff",
                        "primary-container": "#2f4f4f",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f3f0ef",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e5e2e1",
                        "surface": "#fcf9f8",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#2e1508",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#603f2f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "space-sm": "1rem",
                        "container-max": "1120px",
                        "text-max": "680px",
                        "space-xs": "0.5rem",
                        "space-xl": "8rem",
                        "space-lg": "4rem",
                        "space-md": "2rem",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Public Sans"],
                        "headline-lg": ["Newsreader"],
                        "headline-xl": ["Newsreader"],
                        "label-sm": ["Public Sans"],
                        "headline-md": ["Newsreader"],
                        "body-md": ["Public Sans"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.7", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "headline-xl": ["48px", {"lineHeight": "1.1", "fontWeight": "600"}],
                        "label-sm": ["13px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .canvas-writing:focus {
            outline: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md no-scrollbar">
<!-- TopAppBar -->
<header class="bg-[#fcfcfc] dark:bg-stone-950 docked full-width top-0 z-50 border-b border-stone-200 dark:border-stone-800 shadow-none sticky">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-[680px] mx-auto">
<div class="flex items-center gap-4">
<button class="text-stone-500 hover:text-[#2F4F4F] transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<span class="text-2xl italic font-serif text-[#2F4F4F] dark:text-emerald-400 font-serif Newsreader tracking-tight">The Journal</span>
</div>
<div class="flex items-center gap-6">
<button class="font-label-sm text-label-sm text-stone-500 hover:text-primary transition-colors">Draft Saved</button>
<button class="bg-primary text-on-primary px-6 py-2 rounded-full font-label-sm text-label-sm hover:opacity-90 transition-opacity">Publish</button>
</div>
</div>
</header>
<main class="max-w-[680px] mx-auto px-6 pt-16 pb-32">
<!-- Writing Canvas -->
<article class="flex flex-col gap-10">
<!-- Header Image Option -->
<div class="group relative w-full aspect-[21/9] bg-surface-container rounded-lg overflow-hidden cursor-pointer border border-transparent hover:border-outline-variant transition-all">
<img alt="Cover Image Placeholder" class="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity" data-alt="Minimalist desk setup with a journal, a pen, and a cup of coffee in soft morning light, editorial aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-JiPFs_k4tK3y6LOFPuJMPl27YoiNTi7oNF2EoGKl-oFl4nLSrGPq3gPy_tweUHWGP-WbuWd0Xng7IualFf7ZATc2zu8AMH9naYdEe8MyQeE_obJ_5Ow3V9hOj_FzT0g980FPuIHbo855ezjNMO2da4U_zW0v1htpb0ww2Ck3BzwIKc-poOxmimCQI6gP-kratcN0BB7AUnPhBc9j6IXp1JRNxj8Bvu-sV27JgL4fsmefVV40C-Au_ms1ePTgM-xaN5ZYUdxtuUg"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="flex flex-col items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-3xl" data-icon="add_a_photo">add_a_photo</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Add cover image</span>
</div>
</div>
</div>
<!-- Title Input -->
<div class="w-full">
<textarea class="w-full bg-transparent border-none focus:ring-0 font-headline-xl text-headline-xl p-0 resize-none placeholder:text-stone-300" oninput='this.style.height = "";this.style.height = this.scrollHeight + "px"' placeholder="Enter title here..." rows="1"></textarea>
</div>
<!-- Metadata/Tags Area -->
<div class="flex items-center gap-4 py-2 border-y border-stone-100">
<div class="flex items-center gap-2 text-stone-400">
<span class="material-symbols-outlined text-sm" data-icon="calendar_today">calendar_today</span>
<span class="font-label-sm text-label-sm">May 24, 2024</span>
</div>
<div class="h-4 w-[1px] bg-stone-200"></div>
<div class="flex items-center gap-2 text-stone-400 hover:text-primary cursor-pointer transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="sell">sell</span>
<span class="font-label-sm text-label-sm uppercase">Add Tags</span>
</div>
</div>
<!-- Main Text Content -->
<div class="w-full">
<div class="canvas-writing w-full min-h-[400px] bg-transparent font-body-lg text-body-lg focus:outline-none placeholder:text-stone-300 empty:before:content-[attr(data-placeholder)] empty:before:text-stone-300" contenteditable="true" data-placeholder="Start your story..."></div>
</div>
</article>
<!-- Blockquote Design Sample -->
<section class="mt-12 mb-12">
<blockquote class="border-l-4 border-surface-tint pl-8 py-2 italic font-headline-md text-headline-md text-stone-700">
                "Writing is not just communication; it is a way to find clarity in the noise of thought."
            </blockquote>
</section>
</main>
<!-- Floating Minimalist Toolbar -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 z-50">
<div class="bg-surface-container-lowest border border-outline-variant/30 shadow-xl rounded-full px-6 py-3 flex items-center gap-6">
<button class="text-stone-500 hover:text-primary transition-colors flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined" data-icon="format_h1">format_h1</span>
<span class="text-[8px] font-bold opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Title</span>
</button>
<button class="text-stone-500 hover:text-primary transition-colors flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined" data-icon="format_bold">format_bold</span>
<span class="text-[8px] font-bold opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Bold</span>
</button>
<button class="text-stone-500 hover:text-primary transition-colors flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined" data-icon="format_italic">format_italic</span>
<span class="text-[8px] font-bold opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Italic</span>
</button>
<div class="h-6 w-[1px] bg-stone-200"></div>
<button class="text-stone-500 hover:text-primary transition-colors flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined" data-icon="format_quote">format_quote</span>
<span class="text-[8px] font-bold opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Quote</span>
</button>
<button class="text-stone-500 hover:text-primary transition-colors flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined" data-icon="link">link</span>
<span class="text-[8px] font-bold opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Link</span>
</button>
<button class="text-stone-500 hover:text-primary transition-colors flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined" data-icon="image">image</span>
<span class="text-[8px] font-bold opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Media</span>
</button>
<div class="h-6 w-[1px] bg-stone-200"></div>
<button class="text-stone-400 hover:text-error transition-colors flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined" data-icon="delete_outline">delete_outline</span>
<span class="text-[8px] font-bold opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Discard</span>
</button>
</div>
</div>
<!-- Hidden BottomNavBar (Suppressed for transactional writing flow) -->
<!-- The BottomNavBar from JSON is excluded as this is a focused, transactional sub-page with a close action -->
</body></html>
